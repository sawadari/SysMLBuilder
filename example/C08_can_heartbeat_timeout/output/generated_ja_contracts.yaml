generic_case:
  package: C08CanHeartbeatTimeout
  context: このケースは、ブレーキコントローラからのハートビート消失に対して、依存機能を停止し故障を記録する機能を表します。
  requirements_count: 3
  structure:
  - CommunicationMonitoringSystem
  - HeartbeatMonitor
  - CruiseControlGate
  - DiagnosticManager
  interfaces:
  - - HeartbeatPort
    - heartbeat
    - HeartbeatValue
    - in
  - - FunctionControlPort
    - cruiseEnable
    - FunctionControlValue
    - out
  - - DiagnosticStatusPort
    - diagnosticStatus
    - DiagnosticStatusValue
    - out
  part_ports:
    HeartbeatMonitor:
    - - heartbeatIn
      - HeartbeatPort
    - - functionOut
      - FunctionControlPort
    - - diagOut
      - DiagnosticStatusPort
    CruiseControlGate:
    - - functionIn
      - ~FunctionControlPort
    DiagnosticManager:
    - - diagIn
      - ~DiagnosticStatusPort
    CommunicationMonitoringSystem: []
  subparts:
    CommunicationMonitoringSystem:
    - - monitor
      - HeartbeatMonitor
    - - gate
      - CruiseControlGate
    - - diagnostics
      - DiagnosticManager
  interfaces_defs:
  - - CruiseControlInterface
    - FunctionControlPort
    - FunctionControlPort
    - cruiseEnable
  - - DiagnosticStatusInterface
    - DiagnosticStatusPort
    - DiagnosticStatusPort
    - diagnosticStatus
  state_machine:
    name: CommunicationStates
    states:
    - healthy
    - timeoutDetected
    - safeState
    transitions:
    - - healthy
      - timeoutDetected
    - - timeoutDetected
      - safeState
    - - safeState
      - healthy
