generic_case:
  package: C01PowerTailgateConditions
  context: このケースは、開動作前に車両条件を確認し、閉動作中の障害物にも反応するパワーバックドアを表します。
  requirements_count: 3
  structure:
  - PowerTailgateSystem
  - TailgateController
  - TailgateActuator
  - ObstacleSensor
  interfaces:
  - - VehicleSpeedPort
    - vehicleSpeed
    - VehicleSpeedValue
    - in
  - - ShiftPositionPort
    - shiftPosition
    - ShiftPositionValue
    - in
  - - TailgateCommandPort
    - tailgateCommand
    - TailgateCommandValue
    - out
  - - ObstacleSignalPort
    - obstacleDetected
    - ObstacleSignalValue
    - in
  part_ports:
    TailgateController:
    - - speedIn
      - VehicleSpeedPort
    - - shiftIn
      - ShiftPositionPort
    - - obstacleIn
      - ObstacleSignalPort
    - - commandOut
      - TailgateCommandPort
    TailgateActuator:
    - - commandIn
      - ~TailgateCommandPort
    ObstacleSensor:
    - - obstacleOut
      - ObstacleSignalPort
    PowerTailgateSystem: []
  subparts:
    PowerTailgateSystem:
    - - controller
      - TailgateController
    - - actuator
      - TailgateActuator
    - - sensor
      - ObstacleSensor
  interfaces_defs:
  - - TailgateCommandInterface
    - TailgateCommandPort
    - TailgateCommandPort
    - tailgateCommand
  state_machine:
