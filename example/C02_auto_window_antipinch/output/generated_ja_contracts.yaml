generic_case:
  package: C02AutoWindowAntiPinch
  context: このケースは、挟み込み防止機能とドア開時の禁止条件を持つオートウインドウ機能を表します。
  requirements_count: 3
  structure:
  - AutoWindowSystem
  - WindowController
  - WindowMotor
  - PinchSensor
  interfaces:
  - - WindowSwitchPort
    - closeRequest
    - WindowSwitchValue
    - in
  - - DoorStatusPort
    - doorOpen
    - DoorStatusValue
    - in
  - - PinchSignalPort
    - pinchDetected
    - PinchSignalValue
    - in
  - - WindowMotorCommandPort
    - windowCommand
    - WindowMotorCommandValue
    - out
  part_ports:
    WindowController:
    - - switchIn
      - WindowSwitchPort
    - - doorStatusIn
      - DoorStatusPort
    - - pinchIn
      - PinchSignalPort
    - - commandOut
      - WindowMotorCommandPort
    WindowMotor:
    - - commandIn
      - ~WindowMotorCommandPort
    PinchSensor:
    - - pinchOut
      - PinchSignalPort
    AutoWindowSystem: []
  subparts:
    AutoWindowSystem:
    - - controller
      - WindowController
    - - motor
      - WindowMotor
    - - sensor
      - PinchSensor
  interfaces_defs:
  - - WindowMotorCommandInterface
    - WindowMotorCommandPort
    - WindowMotorCommandPort
    - windowCommand
  state_machine:
    name: WindowMotionStates
    states:
    - idle
    - autoClosing
    - reverseOpen
    transitions:
    - - idle
      - autoClosing
    - - autoClosing
      - reverseOpen
    - - reverseOpen
      - idle
