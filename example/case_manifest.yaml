    source_path: models/example_EveOnlineMiningFrigate/DomainModel/MiningFrigateRequirementsDef.sysml
    trace_quality: direct_file_grounded
    observed_constructs:
    - contextual thresholds
    - cargo capacity
    - survivability requirement
  expected_patterns:
  - quantified_property_constraint
  - contextual_quantified_performance
  expected_artifacts:
  - contracts
  - expected_canonical
  - expected_projection_manifest
  scoring_profile: case03_mining_contextual
- case_id: case04_mining_modular_interface_high
  title: standardPortsAndInterfaces 由来の高充足性・モジュール IF ケース
  target_satisfiability: high
  source_model_trace:
