suite_id: gfse_strict_suite_v2
description: GfSE の直接確認できた SysML v2 ファイルを根拠に逆生成した strict benchmark。
cases:
- case_id: case01_vehicle_explicit_high
  title: VehicleModel 由来の高充足性・定量性能と IF ケース
  target_satisfiability: high
  source_model_trace:
    repository: GfSE/SysML-v2-Models
    source_path: models/SE_Models/VehicleModel.sysml
    trace_quality: direct_file_grounded
    observed_constructs:
    - requirement def
    - requirement usage
    - satisfy
    - port def
    - interface def
  expected_patterns:
  - quantified_property_constraint
  - contextual_quantified_performance
  - interface_transfer
  expected_artifacts:
  - contracts
  - expected_canonical
  - expected_projection_manifest
  scoring_profile: case01_vehicle_quantitative
- case_id: case02_vehicle_ambiguous_low
  title: VehicleModel 由来の低充足性・曖昧性能ケース
  target_satisfiability: low
  source_model_trace:
    repository: GfSE/SysML-v2-Models
    source_path: models/SE_Models/VehicleModel.sysml
    trace_quality: direct_file_grounded
    observed_constructs:
    - quantitative requirements
    - interface requirement
  expected_patterns:
  - ambiguous_quality_claim
  - interface_transfer
  expected_artifacts:
  - contracts
  - expected_review_overlay
  scoring_profile: case02_vehicle_ambiguous
- case_id: case03_mining_contextual_performance_high
  title: MiningFrigateRequirementsDef 由来の高充足性・文脈別性能ケース
  target_satisfiability: high
  source_model_trace:
