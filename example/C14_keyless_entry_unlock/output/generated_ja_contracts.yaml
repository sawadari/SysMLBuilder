generic_case:
  package: C14KeylessEntryUnlock
  context: このケースは、有効キー検知、解錠タイミング、および無効試行連続時のロックアウトを表します。
  requirements_count: 3
  structure:
  - KeylessEntrySystem
  - AccessController
  - RfReceiver
  - DoorLockActuator
  interfaces:
  - - KeyPresencePort
    - validKeyPresent
    - KeyPresenceValue
    - in
  - - HandleTouchPort
    - handleTouched
    - HandleTouchValue
    - in
  - - DoorLockCommandPort
    - doorUnlockCommand
    - DoorLockCommandValue
    - out
  part_ports:
    AccessController:
    - - keyIn
      - KeyPresencePort
    - - touchIn
      - HandleTouchPort
    - - commandOut
      - DoorLockCommandPort
    RfReceiver:
    - - keyOut
      - KeyPresencePort
    DoorLockActuator:
    - - commandIn
      - ~DoorLockCommandPort
    KeylessEntrySystem: []
  subparts:
    KeylessEntrySystem:
    - - controller
      - AccessController
    - - receiver
      - RfReceiver
    - - actuator
      - DoorLockActuator
  interfaces_defs:
  - - DoorUnlockInterface
    - DoorLockCommandPort
    - DoorLockCommandPort
    - doorUnlockCommand
  state_machine:
    name: AccessStates
    states:
    - ready
    - lockedOut
    transitions:
    - - ready
      - lockedOut
    - - lockedOut
      - ready
