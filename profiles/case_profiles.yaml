version: 1.0.0
profile_id: gfse_case_profiles_v1
description: Supported benchmark cases expressed as profile data for parsing, contract extraction, overlay rendering, and projection manifests.
cases:
  case01_vehicle_explicit_high:
    canonical_profile_id: case01_vehicle_explicit_high
    document:
      document_id: GFSE-CASE01
      document_name: Vehicle quantitative and interface requirements
      document_name_ja: 車両の定量性能およびインタフェース要求
      language: en
      domain: vehicle_system
    extraction:
      mode: requirements
      section: Requirements
      section_ja: 要求
      contract_rules:
      - source_requirement_id: REQ-VEH-001
        contract_id: C-VEH-001
        pattern_id: quantified_property_constraint
        confidence: 0.97
        subject:
          kind: system
          canonical_name: Vehicle
        captures:
          value:
            regex:
              en:
              - equal to (?P<value>\d+)\s+kg
              ja:
              - (?P<value>\d+)\s*kg以下
            type: int
        slots:
          measured_property: mass
          comparator: <=
          threshold_value: "{value}"
          threshold_unit: kg
          responsible_module: Vehicle
      - source_requirement_id: REQ-VEH-002
        contract_id: C-VEH-002
        pattern_id: contextual_quantified_performance
        confidence: 0.96
        subject:
          kind: system
          canonical_name: Vehicle
        captures:
          mpg:
            regex:
              en:
              - at least (?P<mpg>\d+)\s+mpg.*cargo mass of at least (?P<cargo>\d+)\s+kg
              ja:
              - 少なくとも(?P<mpg>\d+)\s*mpg.*貨物質量が少なくとも(?P<cargo>\d+)\s*kg
              - 貨物質量が少なくとも(?P<cargo>\d+)\s*kg.*少なくとも(?P<mpg>\d+)\s*mpg
            type: int
          cargo:
            regex:
              en:
              - at least (?P<mpg>\d+)\s+mpg.*cargo mass of at least (?P<cargo>\d+)\s+kg
              ja:
              - 少なくとも(?P<mpg>\d+)\s*mpg.*貨物質量が少なくとも(?P<cargo>\d+)\s*kg
              - 貨物質量が少なくとも(?P<cargo>\d+)\s*kg.*少なくとも(?P<mpg>\d+)\s*mpg
            type: int
        slots:
          measured_property: fuelEconomy
          operating_contexts:
          - CityNominal
          contextual_thresholds:
          - context: CityNominal
            comparator: ">="
            value: "{mpg}"
            unit: mpg
          assumption_constraints:
          - lhs: assumedCargoMass
            operator: ">="
            rhs: "{cargo}"
            unit: kg
      - source_requirement_id: REQ-VEH-003
        contract_id: C-VEH-003
        pattern_id: contextual_quantified_performance
        confidence: 0.96
        subject:
          kind: system
          canonical_name: Vehicle
        captures:
          mpg:
            regex:
              en:
              - at least (?P<mpg>\d+)\s+mpg.*cargo mass of at least (?P<cargo>\d+)\s+kg
              ja:
              - 貨物質量が少なくとも(?P<cargo>\d+)\s*kg.*少なくとも(?P<mpg>\d+)\s*mpg
            type: int
          cargo:
            regex:
              en:
              - at least (?P<mpg>\d+)\s+mpg.*cargo mass of at least (?P<cargo>\d+)\s+kg
              ja:
              - 貨物質量が少なくとも(?P<cargo>\d+)\s*kg.*少なくとも(?P<mpg>\d+)\s*mpg
            type: int
        slots:
          measured_property: fuelEconomy
          operating_contexts:
          - HighwayNominal
          contextual_thresholds:
          - context: HighwayNominal
            comparator: ">="
            value: "{mpg}"
            unit: mpg
          assumption_constraints:
          - lhs: assumedCargoMass
            operator: ">="
            rhs: "{cargo}"
            unit: kg
      - source_requirement_id: REQ-VEH-004
        contract_id: C-VEH-004
        pattern_id: interface_transfer
        confidence: 0.95
        subject:
          kind: module
          canonical_name: Engine
        slots:
          interface_name: EngineToTransmissionInterface
          interface_ends:
          - role: p1
            port_type: DrivePwrPort
          - role: p2
            port_type: ClutchPort
          flows:
          - item: Torque
            from: p1
            to: p2
    projection_manifest:
      requirements:
      - sysml_name: vehicleMassRequirement
        source_contract: C-VEH-001
        pattern: MassRequirement
      - sysml_name: cityFuelEconomyRequirement
        source_contract: C-VEH-002
        pattern: FuelEconomyRequirement
      - sysml_name: highwayFuelEconomyRequirement
        source_contract: C-VEH-003
        pattern: FuelEconomyRequirement
      - sysml_name: drivePowerInterface
        source_contract: C-VEH-004
        pattern: DrivePowerInterfaceRequirement
      interfaces:
      - id: IF-VEH-001
        name: engineToTransmissionInterface
        type: EngineToTransmissionInterface
        from: vehicle_b.engine.drivePwrPort
        to: vehicle_b.transmission.clutchPort
      allocations:
      - id: ALLOC-VEH-001
        contract: C-VEH-001
        allocated_to: Structure::vehicle_b
      - id: ALLOC-VEH-004
        contract: C-VEH-004
        allocated_to: Structure::vehicle_b::engine
      satisfy_claims:
      - requirement: Requirements::vehicleSpecification::vehicleMassRequirement
        by: Structure::vehicle_b
      - requirement: Requirements::engineSpecification::drivePowerInterface
        by: Structure::vehicle_b::engine
      views:
      - id: VIEW-VEH-001
        target: Structure::vehicle_b
        rendering: structural_context
  case02_vehicle_ambiguous_low:
    document:
      document_id: GFSE-CASE02
      document_name: Vehicle ambiguous performance requirements
      document_name_ja: 車両の曖昧な性能要求
      language: en
      domain: vehicle_system
    extraction:
      mode: requirements
      section: Narrative requirements
      section_ja: 記述要求
      contract_rules:
      - source_requirement_id: REQ-VEH-L-001
        contract_id: C-VEH-L-001
        pattern_id: ambiguous_quality_claim
        confidence: 0.91
        subject:
          kind: system
          canonical_name: Vehicle
        slots:
          gaps:
          - threshold_value
          - threshold_unit
          - measured_property
          llm_proposals:
          - proposal_id: P-VEH-L-001
            missing_slot: threshold_value
            proposed_value: "2000"
            confidence: 0.56
            rationale:
              en: Mass requirement in VehicleModel uses a 2000 kg style threshold.
              ja: VehicleModel では 2000 kg 級の質量閾値が使われている。
          - proposal_id: P-VEH-L-002
            missing_slot: measured_property
            proposed_value: mass
            confidence: 0.79
            rationale:
              en: The phrase lightweight most likely maps to vehicle mass.
              ja: 軽量という表現は車両質量を指す可能性が高い。
      - source_requirement_id: REQ-VEH-L-002
        contract_id: C-VEH-L-002
        pattern_id: ambiguous_quality_claim
        confidence: 0.9
        subject:
          kind: system
          canonical_name: Vehicle
        slots:
          gaps:
          - operating_contexts
          - threshold_value
          - threshold_unit
          llm_proposals:
          - proposal_id: P-VEH-L-003
            missing_slot: operating_contexts
            proposed_value: CityNominal and HighwayNominal
            confidence: 0.58
            rationale:
              en: VehicleModel separates city and highway fuel economy requirements.
              ja: VehicleModel では市街地と高速の燃費要求が分離されている。
      - source_requirement_id: REQ-VEH-L-003
        contract_id: C-VEH-L-003
        pattern_id: interface_transfer
        confidence: 0.74
        subject:
          kind: module
          canonical_name: Engine
        slots:
          gaps:
          - interface_name
          - interface_ends
          - flows
          llm_proposals:
          - proposal_id: P-VEH-L-004
            missing_slot: interface_name
            proposed_value: EngineToTransmissionInterface
            confidence: 0.68
            rationale:
              en: VehicleModel defines an EngineToTransmissionInterface between engine and transmission.
              ja: VehicleModel ではエンジンとトランスミッション間に EngineToTransmissionInterface が定義されている。
    overlay:
      package_name: Case02VehicleAmbiguousLowExpectedReview
      domain_parts:
      - Vehicle
      - Engine
      drafts:
      - name: DraftVehicleMassRequirement
        subject_name: vehicle
        subject_type: Vehicle
        proposal:
          proposal_id: P-VEH-L-001
          source_contract: C-VEH-L-001
          source_requirement_id: REQ-VEH-L-001
          missing_slot: threshold_value
          proposed_value: "2000"
          rationale:
            en: VehicleModel uses explicit quantitative mass requirements.
            ja: VehicleModel では明示的な定量質量要求が使われている。
          trace_quality: direct_file_grounded
          confidence: 0.56
      - name: DraftVehicleFuelEconomyContext
        subject_name: vehicle
        subject_type: Vehicle
        proposal:
          proposal_id: P-VEH-L-003
          source_contract: C-VEH-L-002
          source_requirement_id: REQ-VEH-L-002
          missing_slot: operating_contexts
          proposed_value: CityNominal and HighwayNominal
          rationale:
            en: VehicleModel separates city and highway fuel economy requirements.
            ja: VehicleModel では市街地と高速の燃費要求が分離されている。
          trace_quality: direct_file_grounded
          confidence: 0.58
      - name: DraftVehicleDrivePowerInterface
        subject_name: engine
        subject_type: Engine
        proposal:
          proposal_id: P-VEH-L-004
          source_contract: C-VEH-L-003
          source_requirement_id: REQ-VEH-L-003
          missing_slot: interface_name
          proposed_value: EngineToTransmissionInterface
          rationale:
            en: VehicleModel defines an EngineToTransmissionInterface between engine and transmission.
            ja: VehicleModel ではエンジンとトランスミッションの間に EngineToTransmissionInterface が定義されている。
          trace_quality: direct_file_grounded
          confidence: 0.68
      missing_slots:
        en:
        - "REQ-VEH-L-001 missing: measured_property, threshold_value, threshold_unit"
        - "REQ-VEH-L-002 missing: operating_contexts, threshold_value, threshold_unit"
        - "REQ-VEH-L-003 missing: interface_name, interface_ends, flows"
        ja:
        - "REQ-VEH-L-001 missing: measured_property, threshold_value, threshold_unit"
        - "REQ-VEH-L-002 missing: operating_contexts, threshold_value, threshold_unit"
        - "REQ-VEH-L-003 missing: interface_name, interface_ends, flows"
      open_questions:
        en:
        - Is lightweight a mass threshold or an acceleration/performance surrogate?
        - Should fuel efficiency be split into city and highway contexts?
        - Does reliable drive power imply an interface requirement, a performance requirement, or both?
        ja:
        - 軽量とは質量閾値なのか、それとも加速性能の代用なのか。
        - 燃費は市街地と高速の文脈に分割すべきか。
        - 確実な駆動力供給はインタフェース要求を意味するのか、性能要求を意味するのか、それとも両方か。
      assumptions:
        en:
        - "Assumption A1: lightweight most likely maps to mass."
        - "Assumption A2: fuel efficient most likely maps to city/highway fuel economy."
        - "Assumption A3: drive power transfer most likely maps to a named interface."
        ja:
        - "Assumption A1: 軽量は質量を指す可能性が高い。"
        - "Assumption A2: 燃費が良いとは市街地/高速燃費を指す可能性が高い。"
        - "Assumption A3: 駆動力伝達は名前付きインタフェースを指す可能性が高い。"
      trace_weaknesses:
        en:
        - The input is intentionally ambiguous.
        - The review overlay should remain the source of truth until the missing quantitative slots are accepted.
        ja:
        - この入力は意図的に曖昧にしてある。
        - 不足している定量スロットが受理されるまでは、レビューオーバーレイを正とすべきである。
      review_guide:
        en:
        - "[review-action] accept / modify / reject / defer"
        - Do not promote any draft to canonical until all missing quantitative slots are resolved.
        ja:
        - "[review-action] accept / modify / reject / defer"
        - 不足している定量スロットがすべて解決するまで、いかなるドラフトも canonical へ昇格させてはならない。
  case03_mining_contextual_performance_high:
    canonical_profile_id: case03_mining_contextual_performance_high
    document:
      document_id: GFSE-CASE03
      document_name: Mining frigate contextual performance requirements
      document_name_ja: 採掘フリゲートの文脈別性能要求
      language: en
      domain: space_system
    extraction:
      mode: requirements
      section: Requirements
      section_ja: 要求
      contract_rules:
      - source_requirement_id: REQ-MF-001
        contract_id: C-MF-001
        pattern_id: quantified_property_constraint
        confidence: 0.98
        subject:
          kind: system
          canonical_name: MiningFrigate
        captures:
          value:
            regex:
              en:
              - at least (?P<value>\d+)\s+m3
              ja:
              - 少なくとも(?P<value>\d+)\s*m3
            type: int
        slots:
          measured_property: cargoCapacity
          comparator: ">="
          threshold_value: "{value}"
