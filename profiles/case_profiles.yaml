  case04_mining_modular_interface_high:
    canonical_profile_id: case04_mining_modular_interface_high
    document:
      document_id: GFSE-CASE04
      document_name: Mining frigate modular interface requirements
      document_name_ja: 採掘フリゲートのモジュラーインタフェース要求
      language: en
      domain: space_system
    extraction:
      mode: requirements
      section: Requirements
      section_ja: 要求
      contract_rules:
      - source_requirement_id: REQ-MFI-001
        contract_id: C-MFI-001
        pattern_id: modular_slot_interface
        confidence: 0.97
        subject:
          kind: module
          canonical_name: MiningFrigateHull
        slots:
          slot_type: HighSlot
          interface_name: HighSlotInterface
          interface_ends:
          - role: hullPort
            port_type: HighSlotPort
          - role: modulePort
            port_type: ~HighSlotPort
          module_bindings:
          - MiningLaserModule
          flows:
          - item: PowerSupply
            from: hullPort.power
            to: modulePort.power
          - item: HighSlotCommand
            from: hullPort.control
            to: modulePort.control
      - source_requirement_id: REQ-MFI-002
        contract_id: C-MFI-002
        pattern_id: interface_transfer
        confidence: 0.98
        subject:
          kind: interface
          canonical_name: HighSlotInterface
        slots:
          interface_name: HighSlotInterface
          interface_ends:
          - role: hullPort
            port_type: HighSlotPort
          - role: modulePort
            port_type: ~HighSlotPort
          flows:
          - item: PowerSupply
            from: hullPort.power
            to: modulePort.power
          - item: HighSlotCommand
            from: hullPort.control
            to: modulePort.control
      - source_requirement_id: REQ-MFI-003
        contract_id: C-MFI-003
        pattern_id: modular_slot_interface
        confidence: 0.97
        subject:
          kind: module
          canonical_name: MiningFrigateHull
        slots:
          slot_type: MediumSlot
          interface_name: MediumSlotInterface
          interface_ends:
          - role: hullPort
            port_type: MediumSlotPort
          - role: modulePort
            port_type: ~MediumSlotPort
          module_bindings:
          - ShieldHardenerModule
          flows:
          - item: PowerSupply
            from: hullPort.power
            to: modulePort.power
          - item: MediumSlotCommand
            from: hullPort.control
            to: modulePort.control
      - source_requirement_id: REQ-MFI-004
        contract_id: C-MFI-004
        pattern_id: interface_transfer
        confidence: 0.98
        subject:
          kind: interface
          canonical_name: MediumSlotInterface
        slots:
          interface_name: MediumSlotInterface
          interface_ends:
          - role: hullPort
            port_type: MediumSlotPort
          - role: modulePort
            port_type: ~MediumSlotPort
          flows:
          - item: PowerSupply
            from: hullPort.power
            to: modulePort.power
          - item: MediumSlotCommand
            from: hullPort.control
            to: modulePort.control
    projection_manifest:
      requirements:
      - sysml_name: highSlotInterfaceRequirement
        source_contract: C-MFI-001|C-MFI-002
        pattern: HighSlotInterfaceRequirement
      - sysml_name: mediumSlotInterfaceRequirement
        source_contract: C-MFI-003|C-MFI-004
        pattern: MediumSlotInterfaceRequirement
      interfaces:
      - id: IF-MFI-001
        name: miningLaserIf
        type: HighSlotInterface
        from: frigate_ref.hull.highSlot1
        to: frigate_ref.miningLaser.modulePort
      - id: IF-MFI-002
        name: shieldIf
        type: MediumSlotInterface
        from: frigate_ref.hull.mediumSlot1
        to: frigate_ref.shieldHardener.modulePort
      allocations:
      - id: ALLOC-MFI-001
        contract: C-MFI-001
        allocated_to: Structure::frigate_ref::hull
      - id: ALLOC-MFI-003
        contract: C-MFI-003
        allocated_to: Structure::frigate_ref::hull
      satisfy_claims:
      - requirement: Requirements::architectureSpecification::highSlotInterfaceRequirement
        by: Structure::frigate_ref::hull
      - requirement: Requirements::architectureSpecification::mediumSlotInterfaceRequirement
        by: Structure::frigate_ref::hull
      views:
      - id: VIEW-MFI-001
        target: Structure::frigate_ref
        rendering: interconnection
  case05_mining_usecase_medium:
    canonical_profile_id: case05_mining_usecase_medium
    document:
      document_id: GFSE-CASE05
      document_name: Mining frigate operational use cases
      document_name_ja: 採掘フリゲートの運用ユースケース
      language: en
      domain: space_system
    extraction:
      mode: use_cases
      section: Operational objectives
      section_ja: 運用目的
      contract_rules:
      - source_requirement_id: UC-MF-001
        contract_id: C-UC-001
        pattern_id: operational_use_case_objective
        confidence: 0.95
        subject:
          kind: system
          canonical_name: MiningFrigate
        slots:
          actors:
          - PilotPod
          - AsteroidBelt
          objective_text:
            en: Mine asteroids and manage cargo.
            ja: 小惑星を採掘し貨物を管理する。
          gaps:
          - success_thresholds
          - time_limits
          - trigger_conditions
          evidence_quote:
            en: "Main Flow: Identify an asteroid target, activate the mining laser, extract ore, and suspend mining when the cargo hold becomes full."
            ja: "メインフロー: 小惑星ターゲットを特定し、採掘レーザーを起動し、鉱石を採取し、貨物倉が満杯になったら採掘を中断する。"
      - source_requirement_id: UC-MF-002
        contract_id: C-UC-002
        pattern_id: operational_use_case_objective
        confidence: 0.94
        subject:
          kind: system
          canonical_name: MiningFrigate
        slots:
          actors:
          - Station
          objective_text:
            en: Offload ore and resupply essential systems.
            ja: 鉱石を荷下ろしし重要システムを補給する。
          gaps:
          - success_thresholds
          - completion_conditions
          evidence_quote:
            en: "Main Flow: Establish a docking connection with a station, transfer ore, and resupply essential systems."
            ja: "メインフロー: ステーションとのドッキング接続を確立し、鉱石を移送し、重要システムを補給する。"
    overlay:
      package_name: Case05MiningUseCaseMediumExpectedReview
      domain_parts:
      - MiningFrigate
      drafts:
      - name: DraftMineAsteroidsCompletionCriteria
        subject_name: miningFrigate
        subject_type: MiningFrigate
        proposal:
          proposal_id: P-UC-001
          source_contract: C-UC-001
          source_requirement_id: UC-MF-001
          missing_slot: success_thresholds
          proposed_value:
            en: define ore extraction completion criteria and cargo-full threshold
            ja: 鉱石採取の完了基準と貨物満杯閾値を定義する
          rationale:
            en: The use case contains main and exception flows but does not define measurable success limits.
            ja: このユースケースはメインフローと例外フローを含むが、測定可能な成功限界を定義していない。
          trace_quality: direct_file_grounded
          confidence: 0.61
      - name: DraftOffloadCompletionCriteria
        subject_name: miningFrigate
        subject_type: MiningFrigate
        proposal:
          proposal_id: P-UC-002
          source_contract: C-UC-002
          source_requirement_id: UC-MF-002
          missing_slot: completion_conditions
          proposed_value:
            en: define successful docking, cargo transfer completion, and resupply completion criteria
            ja: 成功したドッキング、貨物移送完了、補給完了の基準を定義する
          rationale:
            en: The narrative preserves flow but not completion metrics.
            ja: この記述はフローを保持しているが完了指標は保持していない。
          trace_quality: direct_file_grounded
          confidence: 0.6
      missing_slots:
        en:
        - "UC-MF-001 missing: success_thresholds, time_limits, trigger_conditions"
        - "UC-MF-002 missing: success_thresholds, completion_conditions"
        ja:
        - "UC-MF-001 missing: success_thresholds, time_limits, trigger_conditions"
        - "UC-MF-002 missing: success_thresholds, completion_conditions"
      open_questions:
        en:
        - Should mining completion be measured by ore quantity, time, or cargo fill percentage?
        - Should offload success be measured by all cargo transferred, minimum cargo transferred, or docking completion?
        ja:
        - 採掘完了は鉱石量、時間、貨物充填率のどれで測るべきか。
        - 荷下ろし成功は全貨物移送、最小貨物移送、ドッキング完了のどれで測るべきか。
      behavior_candidates:
        en:
        - "Candidate behavior decomposition:"
        - MineAsteroids -> target selection / mining activation / ore transfer / suspend on full cargo
