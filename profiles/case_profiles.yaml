      - source_requirement_id: REQ-MF-002
        contract_id: C-MF-002
        pattern_id: contextual_quantified_performance
        confidence: 0.97
        subject:
          kind: system
          canonical_name: MiningFrigate
        captures:
          value:
            regex:
              en:
              - at least (?P<value>\d+)\s+DPS
              ja:
              - 少なくとも(?P<value>\d+)\s*DPS
            type: int
        slots:
          measured_property: shieldStrength
          operating_contexts:
          - HighSec
          contextual_thresholds:
          - context: HighSec
            comparator: ">="
